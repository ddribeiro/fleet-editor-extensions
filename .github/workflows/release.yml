name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g., 0.1.1)'
        required: false
        type: string
      create_release:
        description: 'Create GitHub release'
        required: false
        default: true
        type: boolean
      build_vsix:
        description: 'Build VS Code extension (VSIX)'
        required: false
        default: true
        type: boolean

env:
  RUST_BACKTRACE: 1
  BINARY_NAME: flint

jobs:
  # ============================================================
  # Build macOS ARM64 (Apple Silicon)
  # ============================================================
  build-macos-arm64:
    runs-on: macos-14
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(grep '^version' Cargo.toml | grep -v workspace | head -1 | sed 's/.*"\(.*\)".*/\1/')
            [ -z "$VERSION" ] && VERSION=$(grep 'version = "' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build
        run: |
          cargo build --release --target aarch64-apple-darwin -p flint
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/${{ env.BINARY_NAME }} dist/
          strip dist/${{ env.BINARY_NAME }}
          dist/${{ env.BINARY_NAME }} --version

      - name: Import Code Signing Certificate
        if: env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          rm certificate.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Code sign
        if: env.CODESIGN_IDENTITY != ''
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          codesign --force --options runtime --timestamp \
            --sign "$CODESIGN_IDENTITY" dist/${{ env.BINARY_NAME }}
          codesign -vvv --deep --strict dist/${{ env.BINARY_NAME }}

      - name: Notarize
        if: env.NOTARIZATION_APPLE_ID != ''
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
        run: |
          ditto -c -k --keepParent dist/${{ env.BINARY_NAME }} binary-notarize.zip
          xcrun notarytool submit binary-notarize.zip \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --wait
          rm binary-notarize.zip
          spctl -a -vv -t install dist/${{ env.BINARY_NAME }} || true

      - name: Archive
        run: |
          cd dist
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE="${{ env.BINARY_NAME }}-${VERSION}-darwin-arm64.tar.gz"
          tar -czf "$ARCHIVE" ${{ env.BINARY_NAME }}
          shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"

      - name: Copy binary for VSIX
        run: |
          mkdir -p editors/vscode/bin
          cp dist/${{ env.BINARY_NAME }} editors/vscode/bin/${{ env.BINARY_NAME }}-darwin-arm64
          chmod +x editors/vscode/bin/${{ env.BINARY_NAME }}-darwin-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: lsp-darwin-arm64
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 90

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-binary-darwin-arm64
          path: editors/vscode/bin/${{ env.BINARY_NAME }}-darwin-arm64
          retention-days: 1

  # ============================================================
  # Build Linux x64
  # ============================================================
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'version = "' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          cargo build --release -p flint
          mkdir -p dist
          cp target/release/${{ env.BINARY_NAME }} dist/
          strip dist/${{ env.BINARY_NAME }}

      - name: Archive
        run: |
          cd dist
          VERSION="${{ steps.version.outputs.version }}"
          tar -czf "${{ env.BINARY_NAME }}-${VERSION}-linux-x64.tar.gz" ${{ env.BINARY_NAME }}
          sha256sum *.tar.gz > "${{ env.BINARY_NAME }}-${VERSION}-linux-x64.tar.gz.sha256"

      - name: Copy binary for VSIX
        run: |
          mkdir -p editors/vscode/bin
          cp dist/${{ env.BINARY_NAME }} editors/vscode/bin/${{ env.BINARY_NAME }}-linux-x64
          chmod +x editors/vscode/bin/${{ env.BINARY_NAME }}-linux-x64

      - uses: actions/upload-artifact@v4
        with:
          name: lsp-linux-x64
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 90

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-binary-linux-x64
          path: editors/vscode/bin/${{ env.BINARY_NAME }}-linux-x64
          retention-days: 1

  # ============================================================
  # Build Linux ARM64
  # ============================================================
  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'version = "' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu -p flint
          mkdir -p dist
          cp target/aarch64-unknown-linux-gnu/release/${{ env.BINARY_NAME }} dist/
          aarch64-linux-gnu-strip dist/${{ env.BINARY_NAME }} || true

      - name: Archive
        run: |
          cd dist
          VERSION="${{ steps.version.outputs.version }}"
          tar -czf "${{ env.BINARY_NAME }}-${VERSION}-linux-arm64.tar.gz" ${{ env.BINARY_NAME }}
          sha256sum *.tar.gz > "${{ env.BINARY_NAME }}-${VERSION}-linux-arm64.tar.gz.sha256"

      - name: Copy binary for VSIX
        run: |
          mkdir -p editors/vscode/bin
          cp dist/${{ env.BINARY_NAME }} editors/vscode/bin/${{ env.BINARY_NAME }}-linux-arm64
          chmod +x editors/vscode/bin/${{ env.BINARY_NAME }}-linux-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: lsp-linux-arm64
          path: |
            dist/*.tar.gz
            dist/*.sha256
          retention-days: 90

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-binary-linux-arm64
          path: editors/vscode/bin/${{ env.BINARY_NAME }}-linux-arm64
          retention-days: 1

  # ============================================================
  # Build VS Code Extension (VSIX)
  # ============================================================
  build-vsix:
    needs: [build-macos-arm64, build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    if: github.event.inputs.build_vsix != 'false'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-binary-*
          path: editors/vscode/bin
          merge-multiple: true

      - name: List binaries
        run: |
          echo "=== Downloaded binaries ==="
          ls -la editors/vscode/bin/
          chmod +x editors/vscode/bin/*

      - name: Install and build
        working-directory: editors/vscode
        run: |
          npm ci
          npm run compile

      - name: Package VSIX
        working-directory: editors/vscode
        run: |
          npx vsce package --allow-missing-repository
          echo "=== VSIX Contents ==="
          unzip -l *.vsix | grep "bin/" | head -10

      - name: Checksums
        working-directory: editors/vscode
        run: |
          for f in *.vsix; do sha256sum "$f" > "${f}.sha256"; done

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: |
            editors/vscode/*.vsix
            editors/vscode/*.sha256
          retention-days: 90

  # ============================================================
  # Create GitHub Release
  # ============================================================
  release:
    needs: [build-macos-arm64, build-macos-x64, build-linux-x64, build-linux-arm64, build-vsix]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.create_release == 'true'

    steps:
      - name: Download LSP artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: lsp-*
          path: dist/lsp
          merge-multiple: true

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix
          path: dist/vsix

      - name: Prepare release
        run: |
          mkdir -p dist/release
          cp dist/lsp/* dist/release/
          cp dist/vsix/* dist/release/
          echo "=== Release files ==="
          ls -la dist/release/

      - name: Determine tag
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="v${{ needs.build-macos-arm64.outputs.version }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Flint ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: true
          files: dist/release/*
          body: |
            ## Install

            ### VS Code
            Download the `.vsix` file and install:
            ```bash
            code --install-extension flint-${{ needs.build-macos-arm64.outputs.version }}.vsix
            ```

            ### macOS (Apple Silicon)
            ```bash
            curl -sL https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/flint-${{ needs.build-macos-arm64.outputs.version }}-darwin-arm64.tar.gz | tar xz
            sudo mv flint /usr/local/bin/
            ```

            ### Linux (x64)
            ```bash
            curl -sL https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/flint-${{ needs.build-macos-arm64.outputs.version }}-linux-x64.tar.gz | tar xz
            sudo mv flint /usr/local/bin/
            ```

            ### Linux (ARM64)
            ```bash
            curl -sL https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/flint-${{ needs.build-macos-arm64.outputs.version }}-linux-arm64.tar.gz | tar xz
            sudo mv flint /usr/local/bin/
            ```

            ### Editors
            - **Zed**: Install flint extension (auto-downloads binary)
            - **Sublime**: Install LSP-fleet package
            - **Neovim**: `require('flint').setup()`
            - **JetBrains**: Install Fleet GitOps plugin

            ### Agent Setup
            ```bash
            flint setup-agent    # installs Claude Code skills
            flint help-ai        # command reference for agents
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
